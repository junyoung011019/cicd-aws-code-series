version: 0.2

env:
  variables:
    APP_VERSION: "1.0.0"
        
phases:
  install:
    runtime-versions:
      java: corretto21
    
  build:
    commands:
      - chmod +x ./gradlew
      - ./gradlew build

artifacts:
  files:
    - build/libs/*.jar
    - appspec.yml
    - scripts/**
  discard-paths: no
  packaging: ZIP
  name: spring-service.zip